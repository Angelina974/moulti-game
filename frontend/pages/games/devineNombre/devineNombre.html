<html lang="fr">
    <head>
        <title>Devine le Nombre</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="../../../assets/css/devineNombre.css" rel="stylesheet">
        <script src="devineNombre.js" defer></script>
    </head>
    <body>
        
        <div class="grosContainer">
            <div class="containerText">
                <h1>Devine le Nombre</h1>
                <p>Devinez le code secret à 4 chiffres. Chaque chiffre est unique.</p>
                <form id="guessForm">
                    <input type="text" id="guessInput" maxlength="4" pattern="\d{4}" required>
                    <button type="submit">Envoyer</button>
                </form>
            </div>
            <div class="container">


            </div>
            <div id="result">

            </div>
        </div>

    </body>
</html>
